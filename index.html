<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Will You Be My Partner?</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>

/* ✅ ADDED FIX */
html {
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
}

body {
  margin: 0;
  text-align: center;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;

  /* ✅ FIX */
  min-height: 100dvh;

  /* ✅ ADDED */
  height: 100vh;
  overscroll-behavior: none;
  position: fixed;
  width: 100%;

  background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1, #ff4d6d);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
}

/* ✅ VERY IMPORTANT FIX */
.bg-heart,
.heart-float {
  pointer-events: none;
  will-change: transform;
}

/* 🔥 CRITICAL: prevent layout expansion */
.bg-heart {
  position: fixed !important;
}

.heart-float {
  position: fixed !important;
}

/* (ALL YOUR ORIGINAL CODE BELOW — NOT TOUCHED) */

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

h1 {
  margin-top: 100px;
  font-size: 2.5em;
  color: white;
  font-family: 'Pacifico', cursive;
}

.love-font {
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  letter-spacing: 1px;
}

.btn {
  padding: 18px 40px;
  font-size: 20px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  position: fixed;

  width: 80%;
  max-width: 300px;

  left: 50%;
  transform: translateX(-50%);
}

#yesBtn {
  top: 60%;
  background-color: #ff4d6d;
  color: white;
  animation: heartbeat 1.2s infinite;
}

#noBtn {
  top: 70%;
  background-color: #444;
  color: white;
}

@keyframes heartbeat {
  0% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.1); }
  100% { transform: translateX(-50%) scale(1); }
}

.bg-heart {
  color: rgba(255,255,255,0.3);
  animation: floatSlow 10s linear infinite;
}

@keyframes floatSlow {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}

.heart-float {
  animation: floatUp 3s linear forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-200px); opacity: 0; }
}

.animal {
  font-size: 80px;
  margin-bottom: 10px;
  animation: heartbeatBear 1.2s infinite;
}

@keyframes heartbeatBear {
  0% { transform: scale(1); }
  25% { transform: scale(1.1); }
  40% { transform: scale(0.95); }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

#result {
  display: none;
  margin-top: 100px;
}

#typingText {
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  font-size: 24px;
  color: white;
}

/* LYRIC BOX */
#lyrics {
  position: fixed;
  bottom: 120px;
  width: 100%;
  color: white;
  font-size: 22px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  text-shadow: 0 0 10px rgba(0,0,0,0.4);

  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  min-height: 200px;
}

#centerLyric {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 28px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  text-align: center;
  text-shadow: 0 0 15px rgba(255, 77, 109, 0.8);
  opacity: 0;
  transition: opacity 1s ease, transform 1s ease;
}

#centerLyric.show {
  opacity: 1 !important;
  transform: translate(-50%, -50%) scale(1.05);
}

#rightImage {
  position: fixed;
  right: 30px;
  top: 50%;
  transform: translateY(-50%);
  width: 220px;
  border-radius: 16px;
  animation: floatImg 3s ease-in-out infinite;
  z-index: 10;
}

@keyframes floatImg {
  0% { transform: translateY(-50%) translateX(0px); }
  50% { transform: translateY(-52%) translateX(-5px); }
  100% { transform: translateY(-50%) translateX(0px); }
}

#yesBtn {
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

#yesBtn img {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: none;
  animation: popIn 0.4s ease forwards;
}

@keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* CLAIM IMAGE */
#claimImage {
  position: fixed;
  right: 45%;
  top: 60%;
  width: 210px;
  max-width: 40vw;
  transform: translateY(-50%) scale(10);
  opacity: 0;
  transition: opacity 1s ease, transform 1s ease;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
  z-index: 20;
}

#bottomText {
  position: fixed;
  bottom: 20px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 18px;
}

#creditText {
  position: fixed;
  right: 15px;
  bottom: 15px;
  color: white;
  font-size: 14px;
}

/* MOBILE */
@media (max-width: 600px) {
  h1 { font-size: 1.8em; margin-top: 60px; }
  #centerLyric { font-size: 20px; width: 90%; }
  #lyrics { font-size: 16px; bottom: 80px; }
  #rightImage { display: none; }
  .animal { font-size: 50px; }
}
#fingerPointer {
  position: fixed;
  font-size: 40px;
  z-index: 999;
  pointer-events: none;

  opacity: 0;
  transition: opacity 0.5s ease;

  display: inline-flex;
  align-items: center;
  gap: 0px;

  animation: pointBounce 1s infinite, fingerBreath 1.2s ease-in-out infinite, blushGlow 1.2s ease-in-out infinite;
}

#fingerPointer .emoji {
  display: inline-block;
}

/* bounce (your existing one) */
@keyframes pointBounce {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

/* 👉👈 move close & apart */
@keyframes fingerBreath {
  0% {
    gap: 0px;
    transform: translateY(0) scale(1);
  }
  50% {
    gap: 12px;
    transform: translateY(0) scale(0.9);
  }
  100% {
    gap: 0px;
    transform: translateY(0) scale(1);
  }
}

/* 💖 blush glow effect */
@keyframes blushGlow {
  0%, 100% {
    filter: drop-shadow(0 0 0px rgba(255, 100, 150, 0));
  }
  50% {
    filter: drop-shadow(0 0 10px rgba(255, 100, 150, 0.8))
            drop-shadow(0 0 20px rgba(255, 50, 120, 0.5));
  }
}
/* your existing bounce */
@keyframes pointBounce {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

/* NEW: 👉👈 close & apart animation */
@keyframes fingerBreath {
  0% {
    gap: 0px;
    transform: translateY(0) scale(1);
  }
  50% {
    gap: 12px;
    transform: translateY(0) scale(0.9);
  }
  100% {
    gap: 0px;
    transform: translateY(0) scale(1);
  }
}
#claimImageLink img:hover {
  transform: scale(1.05);
  transition: 0.3s ease;
}
</style>
</head>

<body>

<div id="lyrics"></div>
<div id="centerLyric">BAKA PRESS CLAIM ME BUTTON</div>

<h1 id="question">Will you be my partner</h1>
<div id="randomText"></div>

<button id="yesBtn" class="btn love-font">
  CLAIM ME 
  <img id="btnImage" src="your-image.png">
</button>

<button id="noBtn" class="btn">NO🗿</button>

<div id="result">
  <div class="animal">🐻</div>
  <div id="fingerPointer">👉👈 </div>
  <h2 id="typingText"></h2>
  <a id="claimImageLink" href="next.html">
  <img id="claimImage" src="choso.jpg">
</a>
  <div id="bottomText">Still shy? what a baka come back when you feel like it</div>
</div>

<audio id="loveSong" src="song.mp3"></audio>

<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const question = document.getElementById("question");
const result = document.getElementById("result");
const loveSong = document.getElementById("loveSong");
const randomText = document.getElementById("randomText");
const lyricsBox = document.getElementById("lyrics");
const centerLyric = document.getElementById("centerLyric");


function showFingerPointer(){
  const finger = document.getElementById("fingerPointer");
  const img = document.getElementById("claimImage");

  // 👉👈 cute split emojis
  finger.innerHTML = `
    <span class="emoji">👉</span>
    <span class="emoji">👈</span>
  `;

  const rect = img.getBoundingClientRect();
  finger.style.left = (rect.left + rect.width / 6) + "px";
  finger.style.top = (rect.top - -60) + "px";
  finger.style.transform = "translateX(-50%)";
  // make it visible
  finger.style.opacity = "1";
}
let heartBoost = 1;

/* RANDOM TEXT */
setInterval(()=>{
  const messages = ["its worth it", "press it baka"];
  randomText.innerText = messages[Math.floor(Math.random()*messages.length)];
},2000);

/* ✅ MOBILE HEART FIX */
const heartSpeed = window.innerWidth < 600 ? 500 : 200;

setInterval(()=>{
  const h=document.createElement("div");
  h.className="bg-heart";
  h.innerText="❤️";
  h.style.left=Math.random()*100+"%";
  h.style.fontSize = (12 * heartBoost) + "px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),10000);
},heartSpeed);

/* BURST HEARTS */
function burstHearts(){
  for(let i=0;i<20;i++){
    const h=document.createElement("div");
    h.className="heart-float";
    h.innerText="💖";
    h.style.left=Math.random()*window.innerWidth+"px";
    h.style.top=window.innerHeight+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),3000);
  }
}

/* TYPE TEXT */
function typeText(text,i=0){
  if(i<text.length){
    document.getElementById("typingText").innerHTML += text.charAt(i);
    setTimeout(()=>typeText(text,i+1),40);
  }
}

/* MUSIC */
function fadeInMusic(){
  loveSong.volume=0;
  let v=0;
  const f=setInterval(()=>{
    if(v<0.5){v+=0.02; loveSong.volume=v;}
    else clearInterval(f);
  },100);
}

function showCenterLyric(text){
  centerLyric.innerText = text;
  centerLyric.classList.add("show");
}

/* NO BUTTON FIXED SCALE */
let noClickCount = 0;
let currentScale = 1;

noBtn.addEventListener("click", ()=>{

  // 💥 explode effect
  for(let i=0;i<25;i++){
    const h=document.createElement("div");
    h.className="heart-float";
    h.innerText="💥";
    h.style.left=noBtn.offsetLeft + noBtn.offsetWidth/2 + "px";
    h.style.top=noBtn.offsetTop + "px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1000);
  }

  // 🧨 remove button instantly
  noBtn.style.display = "none";

  // 📝 message
  question.innerText = "you are not suppose to press no button go press claim me thats for you ;>";
  randomText.innerText = "go press CLAIM ME ";
});

/* CLAIM BUTTON */
yesBtn.addEventListener("click", ()=>{
  setTimeout(()=>{
    const img = document.getElementById("claimImage");
    img.style.opacity = "1";
    img.style.transform = "scale(1)";
    setTimeout(showFingerPointer, 1200);
  }, 2000);

  question.style.display="none";
  yesBtn.style.display="none";
  noBtn.style.display="none";
  result.style.display="block";

  showCenterLyric("I love you.. idk what to say since im slow, But heres this it may impress you");

  burstHearts();
  setInterval(burstHearts,4000);

  loveSong.currentTime = 46;

  loveSong.play().then(()=>{
    fadeInMusic();
    startBeatSync();
    startLyrics();
  });
});

/* BEAT SYNC */
function startBeatSync(){
  setInterval(()=>{
    let t = loveSong.currentTime;

    if (
      (t >= 60.9 && t <= 61.5) ||
      (t >= 67.9 && t <= 68.5) ||
      (t >= 74.9 && t <= 75.5)
    ) {
      heartBoost = 6;
    } else {
      heartBoost *= 0.95;
      if(heartBoost < 1) heartBoost = 1;
    }
  },100);
}

/* LYRICS ENGINE */
const lyrics = [
  { time: 46, text: "Secrets", type: "replace"},
  { time: 46.9, text: "I have", type: "replace"},
  { time: 48, text: "Held in my heart", type: "replace"},
  { time: 50, text: "Are harder", type:"replace"},
  { time: 51, text: "To hide than I thought", type:"replace"},
  { time: 53, text: "Maybe", type:"replace"},
  { time: 54, text: "I just wanna be", type:"replace"},
  { time: 56, text: "Yours", type:"replace"},
  { time: 57, text: "I WANNA BE", type:"replace"},
  { time: 58, text: "YOURS", type:"replace"},
  { time: 59, text: "I WANNA BE YOURS", type:"replace"},
  { time: 62.2, text: "WANNA BE YOURS", type:"replace"},
  { time: 65.8, text: "WANNA BE YOURS", type:"replace"},
  { time: 69.2, text: "WANNA BE YOURS", type:"replace"},
  { time: 72.6, text: "Now you can continue the lyrics with me:>, also you can try clicking on the image it may work", type:"replace"}
];

let lyricIndex = 0;

function startLyrics(){
  let currentReplaceLine = null;

  setInterval(()=>{
    if(
      lyricIndex < lyrics.length &&
      loveSong.currentTime >= lyrics[lyricIndex].time
    ){
      const item = lyrics[lyricIndex];

      const line = document.createElement("div");
      line.innerText = item.text;

      line.style.margin = "6px 0";
      line.style.opacity = "0";
      line.style.transition = "opacity 1.2s ease, transform 1.2s ease";
      line.style.transform = "translateY(10px)";

      setTimeout(()=> {
        line.style.opacity = "1";
        line.style.transform = "translateY(0px)";
      }, 50);

      if(currentReplaceLine){
        currentReplaceLine.remove();
      }

      lyricsBox.appendChild(line);
      currentReplaceLine = line;

      lyricIndex++;
    }
  },200);
}

</script>

</body>
</html>
